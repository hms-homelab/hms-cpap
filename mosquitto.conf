# Mosquitto MQTT Broker Configuration for HMS-CPAP

# Listener configuration
listener 1883
protocol mqtt

# WebSocket listener (optional)
listener 9001
protocol websockets

# Allow anonymous connections (change for production)
# For production, use password file authentication
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# Connection settings
max_connections -1
max_keepalive 300
