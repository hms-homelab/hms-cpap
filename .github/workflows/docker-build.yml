name: Build, Test, and Publish

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Linux Build + Docker ──────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Angular UI ──────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build Angular UI
        working-directory: frontend
        run: npx ng build --configuration production

      # ── C++ Build + Tests ───────────────────────────────────────
      - name: Install C++ dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            build-essential cmake \
            libcurl4-openssl-dev libpq-dev libpqxx-dev libssl-dev \
            libjsoncpp-dev libpaho-mqtt-dev libpaho-mqttpp-dev \
            nlohmann-json3-dev libspdlog-dev libsqlite3-dev \
            libdrogon-dev libgtest-dev libgmock-dev \
            uuid-dev libmariadb-dev libhiredis-dev libbrotli-dev \
            libyaml-cpp-dev zlib1g-dev \
            libhpdf-dev gnuplot

      - name: Build HMS-CPAP
        run: |
          mkdir build && cd build
          cmake -DBUILD_TESTS=ON -DBUILD_WITH_WEB=ON -DBUILD_WITH_MYSQL=ON ..
          make -j$(nproc)

      - name: Run tests
        # Unit gate: skip the flaky / broker-dependent integration suites. They
        # drive real TCP sockets (FysetcTcpServer flakes under CI load) or need a
        # live MQTT broker (the MQTT suites GTEST_SKIP without one). They run in a
        # dedicated integration env, not the unit gate. Mirrors the coverage job's
        # exclusion; pure-logic suites (e.g. FysetcLifecycle) stay in.
        run: cd build && ./tests/run_tests --gtest_filter='-FysetcTcpServerTest.*:MqttClientTest.*:STRMqttIntegrationTest.*:SummaryRegenerationE2ETest.*'

      # ── Copy UI into build output ──────────────────────────────
      - name: Bundle UI with binary
        run: |
          mkdir -p build/static/browser
          cp -r frontend/dist/frontend/browser/* build/static/browser/

      # ── Docker Image ────────────────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo ${{ steps.meta.outputs.digest }}

      - name: Make GHCR package public
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PUT \
            orgs/${{ github.repository_owner }}/packages/container/hms-cpap \
            -f visibility=public || echo "Could not set visibility (may need org admin token)"

  # ── Code Coverage (gcov/lcov) ─────────────────────────────────────
  # Ratchet gate: raise COVERAGE_MIN as test batches land. At 80% (2026-06).
  # Networking E2E suites are excluded by scripts/coverage.sh (they race /
  # segfault under -O0 instrumentation and need a live broker); they still run
  # in the build-and-test job above.
  coverage:
    runs-on: ubuntu-latest
    # Postgres so the DatabaseService (pqxx) suite runs here too instead of
    # GTEST_SKIPping (it isolates each test in a throwaway schema). Creds match
    # the suite's defaults so it connects with no extra wiring.
    services:
      postgres:
        # pgvector image so the AgentMemory pgvector tests run (CREATE EXTENSION
        # vector) instead of skipping — recovers AgentMemory coverage.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: maestro
          POSTGRES_PASSWORD: REDACTED
          POSTGRES_DB: cpap_monitoring
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U maestro"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      COVERAGE_MIN: "80"
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: maestro
      PGPASSWORD: REDACTED
      PGDATABASE: cpap_monitoring
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install C++ dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            build-essential cmake \
            libcurl4-openssl-dev libpq-dev libpqxx-dev libssl-dev \
            libjsoncpp-dev libpaho-mqtt-dev libpaho-mqttpp-dev \
            nlohmann-json3-dev libspdlog-dev libsqlite3-dev \
            libdrogon-dev libgtest-dev libgmock-dev \
            uuid-dev libmariadb-dev libhiredis-dev libbrotli-dev \
            libyaml-cpp-dev zlib1g-dev \
            libhpdf-dev gnuplot lcov

      - name: Run coverage (build instrumented, run tests, enforce ratchet)
        run: bash scripts/coverage.sh "$COVERAGE_MIN"

      - name: Coverage summary to job log
        if: always()
        run: |
          if [ -f coverage/coverage.info ]; then
            { echo '### hms-cpap coverage'; echo '```'; \
              lcov --summary coverage/coverage.info 2>/dev/null \
                --ignore-errors empty,unused,inconsistent || true; \
              echo '```'; } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/html
          if-no-files-found: ignore

  # ── Windows Build ─────────────────────────────────────────────────
  windows-build:
    runs-on: windows-latest
    continue-on-error: true
    permissions:
      contents: read

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static-md

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pin CMake 3.31 (vcpkg Drogon incompatible with CMake 4.x)
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 3.31.7

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      # ── Angular UI ──────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build Angular UI
        working-directory: frontend
        run: npx ng build --configuration production

      # ── vcpkg + C++ Build ───────────────────────────────────────
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\vcpkg\archives
          key: vcpkg-win-x64-static-md-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-win-x64-static-md-

      - name: Install vcpkg dependencies
        run: |
          vcpkg install --triplet x64-windows-static-md

      - name: Build HMS-CPAP (MSVC)
        run: |
          mkdir build
          cd build
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows-static-md -DBUILD_TESTS=OFF -DBUILD_WITH_WEB=ON -DBUILD_WITH_POSTGRESQL=ON ..
          cmake --build . --parallel

      # ── Package Windows release ─────────────────────────────────
      - name: Bundle release
        run: |
          mkdir release
          Copy-Item build\hms_cpap.exe release\
          # Copy any DLLs
          Get-ChildItem -Path build\*.dll -ErrorAction SilentlyContinue | Copy-Item -Destination release\
          # Bundle Angular UI
          mkdir release\static\browser -Force
          Copy-Item -Recurse frontend\dist\frontend\browser\* release\static\browser\
          # Sample config
          @'
          {
            "device_id": "cpap_resmed_SERIAL",
            "device_name": "ResMed AirSense 10",
            "source": "ezshare",
            "ezshare_url": "http://192.168.4.1",
            "burst_interval": 65,
            "web_port": 8893,
            "database": { "type": "sqlite" },
            "mqtt": { "enabled": false }
          }
          '@ | Out-File -Encoding utf8 release\config.example.json

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: hms-cpap-windows-x64
          path: release/

  # ── macOS Build (Apple Silicon / arm64) ───────────────────────────
  # GitHub-hosted arm64 runner (free for public repos). Produces the
  # hms-cpap-macos-arm64.zip that used to be built and uploaded by hand.
  # Dep list mirrors what satisfies the local macOS build (Homebrew), with
  # the one exception that the paho MQTT C++ wrapper has no Homebrew formula
  # and is built from source below.
  macos-build:
    runs-on: macos-14
    continue-on-error: true    # optional, like windows-build: release still ships if this fails
    permissions:
      contents: read

    env:
      # find_package(OpenSSL) needs the keg-only openssl@3, not the system LibreSSL.
      OPENSSL_ROOT_DIR: /opt/homebrew/opt/openssl@3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Angular UI ──────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build Angular UI
        working-directory: frontend
        run: npx ng build --configuration production

      # ── C++ dependencies (Homebrew) ─────────────────────────────
      # Mirrors the local macOS build's resolved deps. CURL comes from the
      # macOS SDK (system libcurl.tbd) so it is not installed here.
      - name: Install C++ dependencies (Homebrew)
        run: |
          brew install cmake ninja drogon jsoncpp openssl@3 libpq libpqxx \
            spdlog nlohmann-json libharu gnuplot hiredis brotli yaml-cpp sqlite

      # ── Paho MQTT C++ (no Homebrew formula — build from source) ──
      # hms-cpap links paho-mqttpp3 (C++) + paho-mqtt3as (async+SSL C). The C++
      # wrapper is not packaged by Homebrew, so build it with its bundled C lib
      # (PAHO_WITH_MQTT_C=ON) and install into the Homebrew prefix so the main
      # build's find_library() calls resolve both libs.
      - name: Build and install paho.mqtt.cpp
        run: |
          # --recurse-submodules: PAHO_WITH_MQTT_C=ON builds the bundled C lib from
          # the externals/paho-mqtt-c submodule, which is empty without this.
          git clone --depth 1 --branch v1.5.2 --recurse-submodules --shallow-submodules \
            https://github.com/eclipse/paho.mqtt.cpp.git
          cmake -S paho.mqtt.cpp -B paho.mqtt.cpp/build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/opt/homebrew \
            -DPAHO_WITH_MQTT_C=ON \
            -DPAHO_WITH_SSL=ON \
            -DPAHO_BUILD_SHARED=ON \
            -DPAHO_BUILD_STATIC=OFF \
            -DPAHO_ENABLE_TESTING=OFF \
            -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT_DIR"
          cmake --build paho.mqtt.cpp/build
          sudo cmake --install paho.mqtt.cpp/build

      # ── C++ Build (native arm64) ────────────────────────────────
      # C++20 because Homebrew libpqxx is built for C++20 (see CLAUDE.md).
      # CMAKE_PREFIX_PATH lists the keg-only kegs (openssl@3/libpq/sqlite) plus
      # the Homebrew root so every find_package/find_library resolves.
      - name: Build HMS-CPAP
        run: |
          export CMAKE_PREFIX_PATH="/opt/homebrew:$(brew --prefix openssl@3):$(brew --prefix libpq):$(brew --prefix sqlite):$(brew --prefix jsoncpp)"
          mkdir build && cd build
          # Homebrew ships CMake 4.x, which rejects cmake_minimum_required < 3.5.
          # The miniz 3.0.2 FetchContent dep still declares an old minimum, so
          # allow it (CMake's own suggested fix). Windows sidesteps this by
          # pinning CMake 3.31.
          cmake -G Ninja \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=20 \
            -DBUILD_TESTS=OFF \
            -DBUILD_WITH_WEB=ON \
            -DBUILD_WITH_POSTGRESQL=ON \
            ..
          cmake --build . --parallel

      # ── Package macOS release ───────────────────────────────────
      - name: Bundle release
        run: |
          mkdir -p release/static/browser
          cp build/hms_cpap release/
          cp -R frontend/dist/frontend/browser/* release/static/browser/
          cat > release/config.example.json <<'EOF'
          {
            "device_id": "cpap_resmed_SERIAL",
            "device_name": "ResMed AirSense 10",
            "source": "ezshare",
            "ezshare_url": "http://192.168.4.1",
            "burst_interval": 65,
            "web_port": 8893,
            "database": { "type": "sqlite" },
            "mqtt": { "enabled": false }
          }
          EOF

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: hms-cpap-macos-arm64
          path: release/

  # ── GitHub Release (on tag push) ──────────────────────────────────
  release:
    # windows-build is in `needs` so this job WAITS for the Windows artifact to
    # finish uploading before it tries to download it -- otherwise release only
    # depended on build-and-test and raced ahead, downloading a not-yet-uploaded
    # artifact and publishing an empty release (v4.6.0 shipped with no assets).
    # always() + the explicit build-and-test guard keeps the native builds
    # OPTIONAL: if Windows or macOS fails, release still proceeds (just without
    # that zip).
    if: >-
      always() &&
      needs.build-and-test.result == 'success' &&
      startsWith(github.ref, 'refs/tags/v')
    needs: [build-and-test, windows-build, macos-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        id: download-windows
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: hms-cpap-windows-x64
          path: windows-release/

      - name: Create Windows zip
        if: steps.download-windows.outcome == 'success'
        run: |
          cd windows-release
          zip -r ../hms-cpap-windows-x64.zip .

      - name: Download macOS artifact
        id: download-macos
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: hms-cpap-macos-arm64
          path: macos-release/

      - name: Create macOS zip
        if: steps.download-macos.outcome == 'success'
        run: |
          cd macos-release
          zip -r ../hms-cpap-macos-arm64.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            hms-cpap-windows-x64.zip
            hms-cpap-macos-arm64.zip
