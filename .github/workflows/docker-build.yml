name: Build, Test, and Publish

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Linux Build + Docker ──────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Angular UI ──────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build Angular UI
        working-directory: frontend
        run: npx ng build --configuration production

      # ── C++ Build + Tests ───────────────────────────────────────
      - name: Install C++ dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            build-essential cmake \
            libcurl4-openssl-dev libpq-dev libpqxx-dev libssl-dev \
            libjsoncpp-dev libpaho-mqtt-dev libpaho-mqttpp-dev \
            nlohmann-json3-dev libspdlog-dev libsqlite3-dev \
            libdrogon-dev libgtest-dev libgmock-dev \
            uuid-dev libmariadb-dev libhiredis-dev libbrotli-dev \
            libyaml-cpp-dev zlib1g-dev \
            libhpdf-dev gnuplot

      - name: Build HMS-CPAP
        run: |
          mkdir build && cd build
          cmake -DBUILD_TESTS=ON -DBUILD_WITH_WEB=ON -DBUILD_WITH_MYSQL=ON ..
          make -j$(nproc)

      - name: Run tests
        run: cd build && ./tests/run_tests

      # ── Copy UI into build output ──────────────────────────────
      - name: Bundle UI with binary
        run: |
          mkdir -p build/static/browser
          cp -r frontend/dist/frontend/browser/* build/static/browser/

      # ── Docker Image ────────────────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo ${{ steps.meta.outputs.digest }}

      - name: Make GHCR package public
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PUT \
            orgs/${{ github.repository_owner }}/packages/container/hms-cpap \
            -f visibility=public || echo "Could not set visibility (may need org admin token)"

  # ── Code Coverage (gcov/lcov) ─────────────────────────────────────
  # Ratchet gate: raise COVERAGE_MIN as test batches land, target 75-80%.
  # Networking E2E suites are excluded by scripts/coverage.sh (they race /
  # segfault under -O0 instrumentation and need a live broker); they still run
  # in the build-and-test job above.
  coverage:
    runs-on: ubuntu-latest
    env:
      COVERAGE_MIN: "30"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install C++ dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            build-essential cmake \
            libcurl4-openssl-dev libpq-dev libpqxx-dev libssl-dev \
            libjsoncpp-dev libpaho-mqtt-dev libpaho-mqttpp-dev \
            nlohmann-json3-dev libspdlog-dev libsqlite3-dev \
            libdrogon-dev libgtest-dev libgmock-dev \
            uuid-dev libmariadb-dev libhiredis-dev libbrotli-dev \
            libyaml-cpp-dev zlib1g-dev \
            libhpdf-dev gnuplot lcov

      - name: Run coverage (build instrumented, run tests, enforce ratchet)
        run: bash scripts/coverage.sh "$COVERAGE_MIN"

      - name: Coverage summary to job log
        if: always()
        run: |
          if [ -f coverage/coverage.info ]; then
            { echo '### hms-cpap coverage'; echo '```'; \
              lcov --summary coverage/coverage.info 2>/dev/null \
                --ignore-errors empty,unused,inconsistent || true; \
              echo '```'; } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/html
          if-no-files-found: ignore

  # ── Windows Build ─────────────────────────────────────────────────
  windows-build:
    runs-on: windows-latest
    continue-on-error: true
    permissions:
      contents: read

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static-md

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pin CMake 3.31 (vcpkg Drogon incompatible with CMake 4.x)
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 3.31.7

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      # ── Angular UI ──────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build Angular UI
        working-directory: frontend
        run: npx ng build --configuration production

      # ── vcpkg + C++ Build ───────────────────────────────────────
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\vcpkg\archives
          key: vcpkg-win-x64-static-md-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-win-x64-static-md-

      - name: Install vcpkg dependencies
        run: |
          vcpkg install --triplet x64-windows-static-md

      - name: Build HMS-CPAP (MSVC)
        run: |
          mkdir build
          cd build
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows-static-md -DBUILD_TESTS=OFF -DBUILD_WITH_WEB=ON -DBUILD_WITH_POSTGRESQL=ON ..
          cmake --build . --parallel

      # ── Package Windows release ─────────────────────────────────
      - name: Bundle release
        run: |
          mkdir release
          Copy-Item build\hms_cpap.exe release\
          # Copy any DLLs
          Get-ChildItem -Path build\*.dll -ErrorAction SilentlyContinue | Copy-Item -Destination release\
          # Bundle Angular UI
          mkdir release\static\browser -Force
          Copy-Item -Recurse frontend\dist\frontend\browser\* release\static\browser\
          # Sample config
          @'
          {
            "device_id": "cpap_resmed_SERIAL",
            "device_name": "ResMed AirSense 10",
            "source": "ezshare",
            "ezshare_url": "http://192.168.4.1",
            "burst_interval": 65,
            "web_port": 8893,
            "database": { "type": "sqlite" },
            "mqtt": { "enabled": false }
          }
          '@ | Out-File -Encoding utf8 release\config.example.json

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: hms-cpap-windows-x64
          path: release/

  # ── GitHub Release (on tag push) ──────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-and-test]
    # windows-build is optional -- release proceeds even if Windows fails
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        id: download-windows
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: hms-cpap-windows-x64
          path: windows-release/

      - name: Create Windows zip
        if: steps.download-windows.outcome == 'success'
        run: |
          cd windows-release
          zip -r ../hms-cpap-windows-x64.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            hms-cpap-windows-x64.zip
